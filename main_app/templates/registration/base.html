{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <title>CampConnect | Account Access</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="{% static 'plugins/fontawesome-free/css/all.min.css' %}">
    <link rel="stylesheet" href="{% static 'plugins/icheck-bootstrap/icheck-bootstrap.min.css' %}">
    <link rel="stylesheet" href="{% static 'dist/css/adminlte.min.css' %}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body.login-page {
            font-family: "Plus Jakarta Sans", sans-serif;
            background:
                radial-gradient(circle at top left, rgba(237, 174, 73, 0.18), transparent 24%),
                radial-gradient(circle at top right, rgba(31, 111, 87, 0.18), transparent 24%),
                linear-gradient(180deg, #eff5ea 0%, #f7faf5 100%);
        }

        .login-box {
            width: min(100%, 420px);
        }

        .login-logo a {
            color: #162114;
            font-weight: 800;
        }

        .card {
            border: 0;
            border-radius: 24px;
            box-shadow: 0 24px 60px rgba(30, 54, 42, 0.12);
            overflow: hidden;
        }
    </style>
</head>

<body class="hold-transition login-page">
    <div class="login-box">
        <div class="login-logo">
            <a href="{% url 'login_page' %}"><b>CampConnect</b></a>
        </div>
        <div class="card">
          {% block content %}
          {% endblock content %}
        </div>
    </div>
    <script src="{% static 'plugins/jquery/jquery.min.js' %}"></script>
    <script src="{% static 'plugins/bootstrap/js/bootstrap.bundle.min.js' %}"></script>
    <script src="{% static 'dist/js/adminlte.min.js' %}"></script>
</body>

</html>
